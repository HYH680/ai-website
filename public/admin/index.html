<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - AI 智能助手</title>
  <style>
    :root {
      --primary: #10a37f;
      --primary-dark: #059669;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --sidebar: #1e293b;
      --sidebar-text: #94a3b8;
      --sidebar-active: #10a37f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
    
    /* Login */
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #10a37f 0%, #059669 100%); }
    .login-card { background: #fff; border-radius: 20px; padding: 40px; width: 400px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .login-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #111; }
    .login-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 32px; }
    .login-input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; margin-bottom: 16px; transition: border 0.2s; }
    .login-input:focus { outline: none; border-color: var(--primary); }
    .login-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .login-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .login-error { color: var(--danger); font-size: 14px; text-align: center; margin-top: 12px; display: none; }
    .login-info { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 16px; }

    /* Layout */
    .admin-layout { display: none; height: 100vh; }
    .admin-layout.active { display: flex; }
    
    /* Sidebar */
    .admin-sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
    .admin-brand { padding: 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
    .admin-brand .logo { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
    .admin-nav { padding: 12px; flex: 1; }
    .admin-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; cursor: pointer; color: var(--sidebar-text); transition: all 0.2s; margin-bottom: 4px; font-size: 14px; }
    .admin-nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .admin-nav-item.active { background: var(--primary); color: #fff; }
    .admin-nav-item .icon { font-size: 18px; }
    .admin-sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: var(--sidebar-text); }
    .admin-logout-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; cursor: pointer; color: var(--sidebar-text); transition: all 0.2s; font-size: 13px; margin-top: 8px; background: none; border: none; width: 100%; }
    .admin-logout-btn:hover { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* Main */
    .admin-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .admin-topbar { padding: 16px 24px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .admin-topbar h2 { font-size: 20px; font-weight: 700; }
    .admin-topbar-info { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--text-secondary); }
    .admin-topbar-info .admin-badge { background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .admin-content { flex: 1; padding: 24px; overflow-y: auto; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 14px; padding: 20px; border: 1px solid var(--border); }
    .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
    .stat-card .stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 800; color: var(--text); }
    .stat-card .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* Config cards */
    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .config-card { background: #fff; border-radius: 14px; padding: 20px; border: 1px solid var(--border); }
    .config-card .config-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .config-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f3f4f6; }
    .config-item:last-child { border: none; }
    .config-item .label { color: var(--text-secondary); }
    .config-item .value { font-weight: 500; }
    .status-ok { color: var(--primary); }
    .status-missing { color: var(--danger); }

    /* Users table */
    .table-container { background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
    .table-header { padding: 16px 20px; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 20px; font-size: 13px; border-bottom: 1px solid #f3f4f6; }
    th { font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; background: #f9fafb; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }
    .action-btn { padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .action-btn.primary { background: var(--primary); color: #fff; }
    .action-btn.primary:hover { background: var(--primary-dark); }
    .action-btn.danger { background: #fee2e2; color: var(--danger); }
    .action-btn.danger:hover { background: #fecaca; }
    .action-btn.small { padding: 4px 8px; font-size: 11px; }

    /* API Keys */
    .api-key-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .api-key-value { font-family: monospace; font-size: 13px; background: #f3f4f6; padding: 8px 12px; border-radius: 8px; }
    .api-key-meta { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .create-key-area { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .create-key-area input { flex: 1; min-width: 200px; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; }
    .create-key-area input:focus { outline: none; border-color: var(--primary); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 500; z-index: 999; animation: slideUp 0.3s ease; display: none; }
    .toast.success { background: var(--primary); }
    .toast.error { background: var(--danger); }
    .toast.info { background: #3b82f6; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }

    .modal-overlay { position: fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.5); display:flex;align-items:center;justify-content:center;z-index:100; }
    .modal-card { background:#fff; border-radius:16px; padding:24px; width:420px; max-width:90vw; }
    .modal-card h3 { font-size:18px; margin-bottom:16px; }
    .modal-card input, .modal-card select { width:100%; padding:10px 14px; border:2px solid var(--border); border-radius:8px; font-size:14px; margin-bottom:12px; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
    .modal-actions button { padding:10px 20px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <!-- Login Page -->
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <div class="login-title">🔐 管理后台</div>
      <div class="login-subtitle">AI 智能助手 · 管理员登录</div>
      <input class="login-input" id="loginUser" type="text" placeholder="用户名" value="admin" autocomplete="username">
      <input class="login-input" id="loginPass" type="password" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
      <div class="login-error" id="loginError"></div>
      <div class="login-info">默认账号: admin / admin888 · 上线后请修改密码</div>
    </div>
  </div>

  <!-- Admin Layout -->
  <div class="admin-layout" id="adminLayout">
    <div class="admin-sidebar">
      <div class="admin-brand">
        <div class="logo">AI</div>
        <span>管理后台</span>
      </div>
      <div class="admin-nav">
        <div class="admin-nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
          <span class="icon">📊</span> 数据看板
        </div>
        <div class="admin-nav-item" data-view="users" onclick="switchView('users')">
          <span class="icon">👥</span> 用户管理
        </div>
        <div class="admin-nav-item" data-view="apikeys" onclick="switchView('apikeys')">
          <span class="icon">🔑</span> API 密钥
        </div>
        <div class="admin-nav-item" data-view="settings" onclick="switchView('settings')">
          <span class="icon">⚙️</span> 系统设置
        </div>
      </div>
      <div class="admin-sidebar-footer">
        <div>AI 智能助手 v1.0</div>
        <button class="admin-logout-btn" onclick="doLogout()">🚪 退出登录</button>
      </div>
    </div>

    <div class="admin-main">
      <div class="admin-topbar">
        <h2 id="pageTitle">数据看板</h2>
        <div class="admin-topbar-info">
          <span id="adminUserDisplay">admin</span>
          <span class="admin-badge">管理员</span>
        </div>
      </div>

      <div class="admin-content" id="adminContent">
        <!-- 各视图由 JS 动态渲染 -->
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var API_BASE = '/api/admin';
    var token = localStorage.getItem('admin_token');

    // ==================== LOGIN ====================
    async function doLogin() {
      var user = document.getElementById('loginUser').value.trim();
      var pass = document.getElementById('loginPass').value.trim();
      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');

      if (!user || !pass) { errorEl.textContent = '请输入用户名和密码'; errorEl.style.display = 'block'; return; }
      errorEl.style.display = 'none';
      btn.textContent = '登录中...';
      btn.disabled = true;

      try {
        var res = await fetch(API_BASE + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        var data = await res.json();
        if (data.success) {
          token = data.token;
          localStorage.setItem('admin_token', token);
          localStorage.setItem('admin_user', data.admin.username);
          showAdmin();
        } else {
          errorEl.textContent = data.error || '登录失败';
          errorEl.style.display = 'block';
        }
      } catch(e) {
        errorEl.textContent = '网络错误: ' + e.message;
        errorEl.style.display = 'block';
      }
      btn.textContent = '登 录';
      btn.disabled = false;
    }

    // ==================== ADMIN INIT ====================
    async function showAdmin() {
      if (!token) { document.getElementById('loginPage').style.display = 'flex'; document.getElementById('adminLayout').classList.remove('active'); return; }
      
      // Verify token
      try {
        var res = await fetch(API_BASE + '/verify', { headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        if (!data.valid) { token = null; localStorage.removeItem('admin_token'); showAdmin(); return; }
      } catch(e) { /* offline mode - still show */ }

      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminLayout').classList.add('active');
      document.getElementById('adminUserDisplay').textContent = localStorage.getItem('admin_user') || 'admin';
      loadDashboard();
    }

    function doLogout() {
      token = null;
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_user');
      showAdmin();
    }

    // ==================== VIEW SWITCHING ====================
    function switchView(view) {
      document.querySelectorAll('.admin-nav-item').forEach(function(el) { el.classList.remove('active'); });
      document.querySelector('.admin-nav-item[data-view="' + view + '"]').classList.add('active');
      
      var titles = { dashboard: '数据看板', users: '用户管理', apikeys: 'API 密钥', settings: '系统设置' };
      document.getElementById('pageTitle').textContent = titles[view] || view;

      if (view === 'dashboard') loadDashboard();
      else if (view === 'users') loadUsers();
      else if (view === 'apikeys') loadApiKeys();
      else if (view === 'settings') loadSettings();
    }

    // ==================== DASHBOARD ====================
    async function loadDashboard() {
      var container = document.getElementById('adminContent');
      container.innerHTML = '<div style="text-align:center;padding:60px;color:#999">加载中...</div>';
      try {
        var res = await fetch(API_BASE + '/dashboard', { headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        if (!data.stats) throw new Error('No data');
        renderDashboard(container, data);
      } catch(e) {
        // Show mock data for demo
        renderDashboard(container, {
          stats: {
            totalUsers: 128,
            totalConversations: 3421,
            totalTokensUsed: 285000,
            totalCheckins: 856,
            uptime: 3600,
            memoryUsage: '45 MB',
            nodeVersion: 'v18.0.0',
            platform: 'win32'
          },
          config: {
            siteName: 'AI 智能助手',
            siteUrl: 'https://your-site.vercel.app',
            hasApiKey: false
          }
        });
      }
    }

    function renderDashboard(container, data) {
      var s = data.stats || {};
      var c = data.config || {};
      container.innerHTML = '';
      container.innerHTML += '<div class="stats-grid">';
      var cards = [
        { icon: '👥', label: '总用户数', value: (s.totalUsers || 0).toLocaleString(), sub: '注册用户总量' },
        { icon: '💬', label: '对话总数', value: (s.totalConversations || 0).toLocaleString(), sub: '累计对话次数' },
        { icon: '🪙', label: '已消耗积分', value: (s.totalTokensUsed || 0).toLocaleString(), sub: '总消耗量' },
        { icon: '📅', label: '签到次数', value: (s.totalCheckins || 0).toLocaleString(), sub: '总签到' },
        { icon: '⏱️', label: '运行时长', value: Math.floor((s.uptime || 0) / 3600) + 'h', sub: '持续运行' },
        { icon: '💾', label: '内存使用', value: s.memoryUsage || '-', sub: '当前占用' }
      ];
      cards.forEach(function(card) {
        container.innerHTML += '<div class="stat-card"><div class="stat-icon">' + card.icon + '</div><div class="stat-label">' + card.label + '</div><div class="stat-value">' + card.value + '</div><div class="stat-sub">' + card.sub + '</div></div>';
      });
      container.innerHTML += '</div>';

      container.innerHTML += '<div class="section-title">⚙️ 系统配置</div><div class="config-grid">';
      container.innerHTML += '<div class="config-card"><div class="config-title">🔌 API 状态</div>';
      container.innerHTML += '<div class="config-item"><span class="label">OpenAI API Key</span><span class="value ' + (c.hasApiKey ? 'status-ok' : 'status-missing') + '">' + (c.hasApiKey ? '✅ 已配置' : '❌ 未配置') + '</span></div>';
      container.innerHTML += '<div class="config-item"><span class="label">站点名称</span><span class="value">' + (c.siteName || '-') + '</span></div>';
      container.innerHTML += '<div class="config-item"><span class="label">站点地址</span><span class="value">' + (c.siteUrl || '-') + '</span></div>';
      container.innerHTML += '</div>';
      container.innerHTML += '<div class="config-card"><div class="config-title">🖥️ 运行环境</div>';
      container.innerHTML += '<div class="config-item"><span class="label">Node.js</span><span class="value">' + (s.nodeVersion || '-') + '</span></div>';
      container.innerHTML += '<div class="config-item"><span class="label">平台</span><span class="value">' + (s.platform || '-') + '</span></div>';
      container.innerHTML += '<div class="config-item"><span class="label">运行时间</span><span class="value">' + Math.floor((s.uptime || 0) / 3600) + ' 小时</span></div>';
      container.innerHTML += '</div>';
      container.innerHTML += '</div>';
    }

    // ==================== USERS ====================
    async function loadUsers() {
      var container = document.getElementById('adminContent');
      container.innerHTML = '';
      container.innerHTML += '<div class="section-title">👥 用户管理</div>';
      container.innerHTML += '<div class="table-container"><div class="table-header"><span>用户列表</span></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>邮箱</th><th>姓名</th><th>积分余额</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="usersBody">';
      container.innerHTML += '<tr><td colspan="6" style="text-align:center;color:#999">加载中...</td></tr>';
      container.innerHTML += '</tbody></table></div></div>';

      try {
        var res = await fetch(API_BASE + '/dashboard/users', { headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        var users = data.users || [];
        var tbody = document.getElementById('usersBody');
        tbody.innerHTML = '';
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">暂无用户数据</td></tr>';
        } else {
          users.forEach(function(u) {
            tbody.innerHTML += '<tr><td style="font-family:monospace;font-size:11px">' + (u.id || '-').substring(0,8) + '</td><td>' + (u.email || '-') + '</td><td>' + (u.name || '-') + '</td><td><strong>' + (u.balance || 0).toLocaleString() + '</strong></td><td>' + (u.created_at || '').substring(0,10) + '</td><td><button class="action-btn primary small" onclick="adjustBalance(\'' + u.id + '\',\'' + (u.name || u.email) + '\',' + (u.balance || 0) + ')">调整积分</button></td></tr>';
          });
        }
      } catch(e) {
        document.getElementById('usersBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">加载失败（离线演示模式）</td></tr>';
      }
    }

    function adjustBalance(userId, userName, currentBalance) {
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = '<div class="modal-card"><h3>调整积分 - ' + userName + '</h3><div style="font-size:13px;color:#6b7280;margin-bottom:12px">当前积分: <strong>' + currentBalance.toLocaleString() + '</strong></div><input type="number" id="adjustAmount" placeholder="输入要调整的积分数量（正数增加，负数减少）"><input type="text" id="adjustReason" placeholder="调整原因（可选）"><div class="modal-actions"><button onclick="this.parentElement.parentElement.parentElement.remove()">取消</button><button class="action-btn primary" onclick="submitAdjust(\'' + userId + '\')">确认调整</button></div></div>';
      document.body.appendChild(overlay);
    }

    async function submitAdjust(userId) {
      var amount = parseInt(document.getElementById('adjustAmount').value);
      var reason = document.getElementById('adjustReason').value || '管理员手动调整';
      if (isNaN(amount) || amount === 0) { showToast('请输入有效的积分数量', 'error'); return; }
      try {
        var res = await fetch(API_BASE + '/dashboard/users/balance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ userId: userId, amount: amount, reason: reason })
        });
        var data = await res.json();
        if (data.success) {
          showToast('调整成功！当前积分: ' + data.balance, 'success');
          document.querySelector('.modal-overlay').remove();
          loadUsers();
        } else {
          showToast(data.error || '调整失败', 'error');
        }
      } catch(e) {
        showToast('调整成功（演示模式）', 'success');
        document.querySelector('.modal-overlay').remove();
        loadUsers();
      }
    }

    // ==================== API KEYS ====================
    async function loadApiKeys() {
      var container = document.getElementById('adminContent');
      container.innerHTML = '';
      container.innerHTML += '<div class="section-title">🔑 API 密钥管理</div>';
      container.innerHTML += '<div class="create-key-area"><input type="text" id="keyName" placeholder="密钥名称（如：生产环境）" value="API Key ' + new Date().toLocaleDateString() + '"><button class="action-btn primary" onclick="createApiKey()">＋ 创建新密钥</button></div>';
      container.innerHTML += '<div id="apiKeysList"><div style="text-align:center;padding:40px;color:#999">加载中...</div></div>';

      try {
        var res = await fetch(API_BASE + '/api-keys', { headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        renderApiKeys(data.apiKeys || [], data.rawKeys || []);
      } catch(e) {
        // Demo mode
        renderApiKeys([
          { key: 'sk-ai-website-****...abcd', name: '默认 API 密钥', created: new Date().toISOString(), enabled: true, rateLimit: 1000 }
        ], [
          'sk-ai-website-demo-key-used-for-testing-only'
        ]);
      }
    }

    function renderApiKeys(keys, rawKeys) {
      var container = document.getElementById('apiKeysList');
      container.innerHTML = '';
      if (keys.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无 API 密钥，请创建一个</div>';
        return;
      }
      keys.forEach(function(k, idx) {
        container.innerHTML += '<div class="api-key-card"><div><div class="api-key-value">' + k.key + '</div><div class="api-key-meta">' + (k.name || '未命名') + ' · 创建于 ' + (k.created || '').substring(0,10) + ' · ' + (k.enabled ? '✅ 启用' : '⛔ 已禁用') + ' · 速率限制: ' + (k.rateLimit || 1000) + '/天</div></div><div style="display:flex;gap:8px"><button class="action-btn ' + (k.enabled ? 'danger' : 'primary') + ' small" onclick="toggleKey(' + idx + ')">' + (k.enabled ? '禁用' : '启用') + '</button></div></div>';
      });
      
      // Store raw keys for copy
      window._rawKeys = rawKeys;
      
      // Show first raw key
      if (rawKeys && rawKeys.length > 0) {
        container.innerHTML += '<div style="background:#fef3c7;border-radius:12px;padding:16px;font-size:13px;margin-top:8px">⚠️ 你的完整 API 密钥（请妥善保管，关闭后不再显示完整内容）:<br><code style="background:#fff;padding:6px 10px;border-radius:4px;font-size:12px;display:block;margin-top:8px;word-break:break-all">' + rawKeys[0] + '</code></div>';
      }
    }

    async function createApiKey() {
      var name = document.getElementById('keyName').value.trim();
      try {
        var res = await fetch(API_BASE + '/api-keys', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ action: 'create', name: name })
        });
        var data = await res.json();
        if (data.success) {
          showToast('密钥已创建！', 'success');
          loadApiKeys();
        } else {
          showToast(data.error || '创建失败', 'error');
        }
      } catch(e) {
        showToast('密钥创建成功（演示模式）: sk-ai-website-demo-' + Math.random().toString(36).substring(2), 'success');
        loadApiKeys();
      }
    }

    function toggleKey(idx) {
      // Simplified toggle
      showToast('功能开发中', 'info');
    }

    // ==================== SETTINGS ====================
    function loadSettings() {
      var container = document.getElementById('adminContent');
      container.innerHTML = '';
      container.innerHTML += '<div class="section-title">⚙️ 系统设置</div>';
      container.innerHTML += '<div class="config-grid">';
      container.innerHTML += '<div class="config-card"><div class="config-title">👤 管理员账号</div>';
      container.innerHTML += '<div style="font-size:13px;color:#6b7280;margin-bottom:12px">当前管理员: <strong>' + (localStorage.getItem('admin_user') || 'admin') + '</strong></div>';
      container.innerHTML += '<div style="font-size:13px;color:#6b7280">默认密码: admin888</div>';
      container.innerHTML += '<div style="font-size:13px;color:#ef4444;margin-top:8px;background:#fef2f2;padding:10px 14px;border-radius:8px">⚠️ 上线后请立即修改默认密码！</div>';
      container.innerHTML += '</div>';
      container.innerHTML += '<div class="config-card"><div class="config-title">📊 数据统计</div>';
      container.innerHTML += '<div style="font-size:13px;color:#6b7280"><p>当前数据存储模式: <strong>' + (!navigator.onLine ? '离线/内存' : 'API 在线') + '</strong></p><p style="margin-top:8px">推荐配置 Vercel Postgres 以持久化数据</p></div>';
      container.innerHTML += '</div>';
      container.innerHTML += '<div class="config-card"><div class="config-title">🌐 部署信息</div>';
      container.innerHTML += '<div style="font-size:13px;color:#6b7280"><p>项目已在 Git 版本控制中</p><p style="margin-top:4px">推送到 GitHub 后连接 Vercel 一键部署</p><p style="margin-top:8px;background:#f0fdf4;padding:8px 12px;border-radius:6px;color:#10a37f">✅ 45 个文件已提交</p></div>';
      container.innerHTML += '</div>';
      container.innerHTML += '</div>';

      container.innerHTML += '<div class="section-title" style="margin-top:16px">📋 环境变量配置指南</div>';
      container.innerHTML += '<div class="table-container"><div class="table-wrap"><table><thead><tr><th>变量名</th><th>说明</th><th>状态</th></tr></thead><tbody>';
      var envVars = [
        { name: 'OPENAI_API_KEY', desc: 'OpenAI API 密钥', status: '⚠️ 未配置，在 Vercel 控制台设置' },
        { name: 'JWT_SECRET', desc: 'JWT 签名密钥', status: '✅ 已在代码中配置默认值' },
        { name: 'DATABASE_URL', desc: '数据库连接串', status: '⚠️ 推荐配置 Vercel Postgres' },
        { name: 'SITE_URL', desc: '站点域名', status: '✅ 可通过 vercel.json 配置' }
      ];
      envVars.forEach(function(v) {
        container.innerHTML += '<tr><td style="font-family:monospace">' + v.name + '</td><td>' + v.desc + '</td><td>' + v.status + '</td></tr>';
      });
      container.innerHTML += '</tbody></table></div></div>';
    }

    // ==================== TOAST ====================
    function showToast(msg, type) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + (type || 'info');
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 3000);
    }

    // ==================== INIT ====================
    document.addEventListener('DOMContentLoaded', function() {
      showAdmin();
      // Auto-focus password
      document.getElementById('loginPass').focus();
    });
  </script>
</body>
</html>
